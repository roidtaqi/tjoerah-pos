name: Deploy Flutter Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-web.yml"
      - "tjoerah_mobile/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate cloud API URL
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Set the repository variable API_BASE_URL before deploying." >&2
            exit 1
          fi
          case "$API_BASE_URL" in
            https://*/api) ;;
            *) echo "API_BASE_URL must use HTTPS and end with /api." >&2; exit 1 ;;
          esac

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: tjoerah_mobile
        run: flutter pub get

      - name: Analyze
        working-directory: tjoerah_mobile
        run: flutter analyze

      - name: Test
        working-directory: tjoerah_mobile
        run: flutter test

      - name: Build web
        working-directory: tjoerah_mobile
        run: >-
          flutter build web --release
          --no-wasm-dry-run
          --base-href "/${{ github.event.repository.name }}/"
          --dart-define="API_BASE_URL=$API_BASE_URL"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tjoerah_mobile/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
